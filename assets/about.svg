<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600" role="img" aria-label="DJPJ portrait">
  <defs>
    <radialGradient id="bga" cx="50%" cy="32%" r="75%">
      <stop offset="0" stop-color="#26262b"/>
      <stop offset="55%" stop-color="#141417"/>
      <stop offset="100%" stop-color="#070708"/>
    </radialGradient>
    <linearGradient id="fig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a40"/>
      <stop offset="100%" stop-color="#0c0c0e"/>
    </linearGradient>
    <radialGradient id="rim" cx="62%" cy="28%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="480" height="600" fill="url(#bga)"/>
  <rect width="480" height="600" fill="url(#rim)"/>

  <!-- silhouette: head + shoulders -->
  <path d="M240 150
           C282 150 312 184 312 230
           C312 268 296 296 270 308
           C336 320 372 372 384 452
           L384 600 L96 600 L96 452
           C108 372 144 320 210 308
           C184 296 168 268 168 230
           C168 184 198 150 240 150 Z" fill="url(#fig)"/>
  <!-- headphones -->
  <path d="M170 232 Q170 158 240 158 Q310 158 310 232" fill="none" stroke="#5a5a62" stroke-width="10" stroke-linecap="round"/>
  <rect x="156" y="216" width="26" height="50" rx="8" fill="#4a4a52"/>
  <rect x="298" y="216" width="26" height="50" rx="8" fill="#4a4a52"/>

  <text x="240" y="556" font-family="Anton, sans-serif" font-size="42" fill="#f2f2f0" text-anchor="middle" letter-spacing="3" opacity="0.95">DJPJ</text>
  <text x="240" y="582" font-family="monospace" font-size="12" fill="#6a6a6a" text-anchor="middle" letter-spacing="2">ADD YOUR PHOTO HERE</text>
</svg>

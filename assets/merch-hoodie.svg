  <!-- pocket -->
  <path d="M236 372 L364 372 L350 446 L250 446 Z" fill="none" stroke="#000" stroke-width="3" opacity="0.4"/>
  <!-- drawstrings -->
  <line x1="288" y1="180" x2="284" y2="250" stroke="#d8d8d8" stroke-width="4"/>
  <line x1="312" y1="180" x2="316" y2="250" stroke="#d8d8d8" stroke-width="4"/>
  <!-- folds -->
  <path d="M236 250 Q246 360 240 486" fill="none" stroke="#000" stroke-width="2" opacity="0.25"/>
  <path d="M364 250 Q354 360 360 486" fill="none" stroke="#000" stroke-width="2" opacity="0.25"/>
  <!-- print -->
  <text x="300" y="330" font-family="Anton, sans-serif" font-size="58" fill="#f2f2f0" text-anchor="middle" letter-spacing="3">DJPJ</text>
  <rect x="252" y="345" width="96" height="3" fill="#f2f2f0"/>

  <text x="300" y="586" font-family="monospace" font-size="12" fill="#5a5a5a" text-anchor="middle" letter-spacing="2">HOODIE — REPLACE WITH PHOTO</text>

  </defs>

  <rect width="600" height="600" fill="url(#bgh)"/>
  <ellipse cx="300" cy="544" rx="180" ry="26" fill="#000" opacity="0.45"/>

  <!-- body + sleeves -->
  <path d="M214 150 L150 196 L188 248 L214 230 L210 506 Q300 522 390 506 L386 230 L412 248 L450 196 L386 150
           Q300 196 214 150 Z" fill="url(#fabh)"/>
